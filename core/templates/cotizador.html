{% load static %}
<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotizador de Recetas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  <script src="https://unpkg.com/htmx.org@1.9.3"></script>
  <script src="{% static 'js/cotizador.js' %}"></script>
</head>

<body class="bg-dark d-flex flex-column align-items-center justify-content-start py-5" style="min-height: 100vh;">
  <!-- Loader HTMX -->
  <div id="loader" class="spinner-overlay">
    <div class="spinner-border text-light" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card shadow-lg border-0 mb-4"
    style="width: 50vw; max-width: 672px; min-width: 300px; background-color: #333333;">
    <div class="gradient-header text-white p-4 rounded-top">
      <div class="d-flex align-items-center gap-3 mb-0">
        <i class="bi bi-calculator" style="font-size: 2rem;"></i>
        <h2 class="fs-2 fw-bold mb-0">Cotizador de Recetas</h2>
      </div>
    </div>
    <div class="p-4">
      <form id="cotizador-form" hx-post="{% url 'cotizador' %}" hx-target="#resultado-container"
        hx-trigger="change delay:300ms">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label text-white fw-semibold">Seleccione un plato</label>
          <select class="form-select fw-bold" name="plato" required>
            <option value="" selected disabled>-- Elija un plato --</option>
            {% for p in platos %}
            <option value="{{ p }}">{{ p|capfirst }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label text-white fw-semibold">Fecha</label>
          <input type="date" class="form-control fw-bold" name="fecha" value="{{ hoy }}" min="{{ min_fecha }}"
            max="{{ hoy }}" onclick="this.showPicker()" />
        </div>
      </form>
    </div>
  </div>

  <!-- Contenedor de Resultados -->
  <div id="resultado-container" class="w-100 d-flex justify-content-center px-3"></div>
</body>

</html>
